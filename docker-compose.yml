version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: qwerty123
      MYSQL_DATABASE: guid_book
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pqwerty123"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgdb:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty123
      POSTGRES_DB: guid_book
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guid_book"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Обмежуємо паралельні запити щоб зменшити пікове споживання пам'яті
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    restart: unless-stopped

  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    restart: on-failure
    command: >
      sh -c "
      echo 'Очікування готовності Ollama API...' &&
      until curl -sf http://ollama:11434/api/tags > /dev/null 2>&1; do
        echo 'Ollama ще не готова, чекаємо 5 секунд...' && sleep 5;
      done &&
      echo 'Ollama готова! Завантаження моделей...' &&
      curl -sf -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3\"}' --max-time 1800 &&
      echo 'llama3 завантажено. Завантаження nomic-embed-text...' &&
      curl -sf -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}' --max-time 600 &&
      echo 'Всі моделі успішно завантажено!'
      "

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=pgdb
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=qwerty123
      - DB_NAME=guid_book
      - PORT=3001
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=phi3
      - ASSISTANT_USE_LLM=true
      - NODE_ENV=production
      - JWT_SECRET=super_secret_key
      - JWT_REFRESH_SECRET=super_refresh_key
      - ENCRYPTION_KEY=a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4
    depends_on:
      ollama:
        condition: service_started
      pgdb:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  pg_data:
  ollama_data: