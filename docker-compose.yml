version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: qwerty123
      MYSQL_DATABASE: guid_book
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    command: >
      sh -c "
      echo 'Очікування запуску Ollama...' && sleep 10 &&
      echo 'Завантаження моделі llama3 (це може зайняти час)...' && curl -s -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3\"}' &&
      echo 'Завантаження моделі nomic-embed-text...' && curl -s -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}' &&
      echo 'Ollama повністю готова до роботи!'
      "

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=qwerty123
      - DB_NAME=guid_book
      - PORT=3001
      - OLLAMA_URL=http://ollama:11434
      - NODE_ENV=production
      - JWT_SECRET=super_secret_key
      - JWT_REFRESH_SECRET=super_refresh_key
    depends_on:
      - db
      - ollama
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  ollama_data: